<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baifo IA</title>
  <link rel="icon" href="/favicon.ico" />

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#121821;
      --text:#e6eefc;
      --muted:#98a4ba;
      --border:rgba(255,255,255,.08);
      --accent:#4cc9f0;
      --accent-2:#3a86ff;
      --radius:16px;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    html,body{height:100%}
    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      min-height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:20;
      background:linear-gradient(180deg,rgba(0,0,0,.25),transparent);
      backdrop-filter:blur(6px);
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:16px 20px;
    }

    .logo{
      width:36px;
      height:36px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      display:grid;
      place-items:center;
      color:#06131d;
      font-weight:900;
    }

    .brand{font-weight:700}

    .brand small{
      display:block;
      color:var(--muted);
      font-weight:400;
    }

    main{padding:18px}

    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      gap:16px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .chat-area{
      display:grid;
      grid-template-rows:1fr auto;
    }

    #chat{
      padding:18px;
      max-height:55vh;
      overflow:auto;
      scroll-behavior:smooth;
    }

    .mensaje{
      background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      margin-bottom:10px;
    }

    .usuario{
      background:linear-gradient(135deg,rgba(76,201,240,.15),rgba(58,134,255,.12));
    }

    .botsito{
      background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);
    }

    .composer{
      display:grid;
      gap:10px;
      padding:12px;
      border-top:1px solid var(--border);
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow);
    }

    .on{
      background:linear-gradient(135deg,#2dd4bf,#22c55e);
      border-color:transparent;
      color:#04151f;
      font-weight:700;
    }

    .off{
      background:linear-gradient(135deg,#ff4d6d,#ff8fa3);
      border-color:transparent;
      color:white;
      font-weight:700;
    }

    #estado{
      color:var(--muted);
      font-size:14px;
    }

    #resumen-container{padding:12px}

    footer{
      color:var(--muted);
      text-align:center;
      padding:14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="topbar">
        <div class="logo">B</div>
        <div class="brand">
          Baifo IA
          <small>Asistente escolar con voz</small>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="panel chat-area">
          <div id="chat"></div>

          <div class="composer">
            <div class="row">
              <button class="on" onclick="activarModoBaifo()">🟢 Encender Baifo</button>
              <button class="off" onclick="detenerModoBaifo()">🔴 Apagar Baifo</button>
              <button onclick="limpiarChat()">🧹 Limpiar pantalla</button>
              <span id="estado">Baifo está apagado.</span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer>© <span id="year"></span> Baifo</footer>
  </div>

<script>

document.getElementById('year').textContent = new Date().getFullYear();

let reconocimientoBaifo;
let modoBaifoActivo=false;
let esperandoPregunta=false;

// 🔥 voz instantánea
function hablarLocal(texto){
  const u=new SpeechSynthesisUtterance(texto);
  u.lang="es-ES";
  speechSynthesis.speak(u);
}

// 🔥 agregar mensaje
function agregarMensaje(texto,clase=''){
  const chat=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='mensaje '+clase;
  m.innerHTML=texto;
  chat.appendChild(m);
  chat.scrollTop=chat.scrollHeight;
}

// 🔥 STREAMING
async function enviarPreguntaStreaming(pregunta){
  agregarMensaje('<strong>Tú:</strong> '+pregunta,'usuario');

  const res=await fetch('/stream',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pregunta})
  });

  const reader=res.body.getReader();
  const decoder=new TextDecoder();

  let textoCompleto="";

  while(true){
    const {done,value}=await reader.read();
    if(done) break;

    const chunk=decoder.decode(value);
    textoCompleto+=chunk;

    hablarLocal(chunk);
  }

  agregarMensaje('<strong>Baifo 🤖:</strong> '+textoCompleto,'botsito');
}

// 🎤 activar
function activarModoBaifo(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

  reconocimientoBaifo=new SR();
  reconocimientoBaifo.lang="es-ES";
  reconocimientoBaifo.continuous=true;

  reconocimientoBaifo.onresult=(e)=>{
    const texto=e.results[e.results.length-1][0].transcript.toLowerCase();

    if(!esperandoPregunta){
      if(texto.includes("baifo")){
        esperandoPregunta=true;
        hablarLocal("Te escucho");
      }
      return;
    }

    esperandoPregunta=false;

    const pregunta=texto.replace("baifo","").trim();

    if(pregunta.length>2){
      enviarPreguntaStreaming(pregunta);
    }
  };

  reconocimientoBaifo.onend=()=>{
    if(modoBaifoActivo){
      setTimeout(()=>reconocimientoBaifo.start(),300);
    }
  };

  modoBaifoActivo=true;
  reconocimientoBaifo.start();
}

// 🛑 apagar
function detenerModoBaifo(){
  modoBaifoActivo=false;
  if(reconocimientoBaifo) reconocimientoBaifo.stop();
}

// limpiar
function limpiarChat(){
  document.getElementById('chat').innerHTML="";
}

</script>

</body>
</html>
