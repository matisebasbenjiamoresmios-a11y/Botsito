<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baifo IA</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#121821;
      --text:#e6eefc;
      --muted:#98a4ba;
      --border:rgba(255,255,255,.08);
      --accent:#4cc9f0;
      --accent-2:#3a86ff;
      --radius:16px;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    #chat{
      max-height:60vh;
      overflow:auto;
      margin-bottom:15px;
    }

    .mensaje{
      padding:10px;
      margin-bottom:10px;
      border-radius:12px;
      background:#1a2230;
    }

    .usuario{background:#24415a;}
    .botsito{background:#1a2d22;}

    button{
      padding:10px;
      border-radius:10px;
      border:none;
      margin-right:5px;
      cursor:pointer;
    }

    .on{background:#22c55e;}
    .off{background:#ef4444;}
  </style>
</head>

<body>
<div class="container">

  <div id="chat"></div>

  <button class="on" onclick="activarModoBaifo()">Encender</button>
  <button class="off" onclick="detenerModoBaifo()">Apagar</button>

</div>

<script>
let mensajeEncendidoMostrado = false;
let audioActual = null;
let modoBaifoActivo = false;
let reconocimientoBaifo = null;
let esperandoPregunta = false;
let baifoHablando = false;

function agregarMensaje(texto, clase=''){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='mensaje '+clase;
  div.innerHTML=texto;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

async function hablarConOpenAI(texto){
  try{
    baifoHablando=true;

    const res=await fetch('/voz',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({texto})
    });

    const blob=await res.blob();
    const url=URL.createObjectURL(blob);

    audioActual=new Audio(url);

    audioActual.onended=()=>{baifoHablando=false};

    audioActual.play();

  }catch(e){
    baifoHablando=false;
    console.log(e);
  }
}

function activarModoBaifo(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Usá Chrome");
    return;
  }

  if(modoBaifoActivo) return;

  modoBaifoActivo=true;

  reconocimientoBaifo=new SpeechRecognition();
  reconocimientoBaifo.lang="es-ES";
  reconocimientoBaifo.continuous=true;
  reconocimientoBaifo.interimResults=true;

  reconocimientoBaifo.onstart=()=>{
    if(!mensajeEncendidoMostrado){
      agregarMensaje("<b>Baifo:</b> Estoy listo. Decí Hey Baifo","botsito");
      mensajeEncendidoMostrado=true;
    }
  };

  reconocimientoBaifo.onresult=(event)=>{
    if(baifoHablando) return;

    const texto=event.results[event.results.length-1][0].transcript.toLowerCase();

    if(!esperandoPregunta){
      if(
        texto.includes("hey baifo")||
        texto.includes("baifo")||
        texto.includes("bifo")||
        texto.includes("vaifo")
      ){
        esperandoPregunta=true;
        agregarMensaje("<b>Baifo:</b> Te escucho","botsito");
        hablarConOpenAI("Te escucho");
      }
      return;
    }

    esperandoPregunta=false;

    const pregunta=texto
      .replace("hey baifo","")
      .replace("baifo","")
      .replace("bifo","")
      .replace("vaifo","")
      .replace("Hola Baifo","")
      .trim();

    if(pregunta.length>2){
      enviarPregunta(pregunta);
    }
  };

  reconocimientoBaifo.onend=()=>{
    if(modoBaifoActivo){
      setTimeout(()=>reconocimientoBaifo.start(),500);
    }
  };

  reconocimientoBaifo.start();
}

function detenerModoBaifo(){
  modoBaifoActivo=false;
  esperandoPregunta=false;
  mensajeEncendidoMostrado=false;

  if(reconocimientoBaifo){
    reconocimientoBaifo.stop();
  }

  if(audioActual){
    audioActual.pause();
  }

  agregarMensaje("<b>Baifo:</b> Apagado","botsito");
}

function enviarPregunta(pregunta){
  agregarMensaje("<b>Tú:</b> "+pregunta,"usuario");

  fetch('/preguntar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pregunta})
  })
  .then(res=>res.json())
  .then(data=>{
    agregarMensaje("<b>Baifo:</b> "+data.respuesta,"botsito");

    setTimeout(()=>{
      hablarConOpenAI(data.respuesta);
    },30);
  });
}
</script>

</body>
</html>
