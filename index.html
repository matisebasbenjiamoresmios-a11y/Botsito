<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baifo IA</title>
  <link rel="icon" href="/favicon.ico" />

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#121821;
      --text:#e6eefc;
      --muted:#98a4ba;
      --border:rgba(255,255,255,.08);
      --accent:#4cc9f0;
      --accent-2:#3a86ff;
      --radius:16px;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    html,body{height:100%}
    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      min-height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:20;
      background:linear-gradient(180deg,rgba(0,0,0,.25),transparent);
      backdrop-filter:blur(6px);
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:16px 20px;
    }

    .logo{
      width:36px;
      height:36px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      display:grid;
      place-items:center;
      color:#06131d;
      font-weight:900;
    }

    .brand{font-weight:700}

    .brand small{
      display:block;
      color:var(--muted);
      font-weight:400;
    }

    main{padding:18px}

    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      gap:16px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .chat-area{
      display:grid;
      grid-template-rows:1fr auto;
    }

    #chat{
      padding:18px;
      max-height:55vh;
      overflow:auto;
      scroll-behavior:smooth;
    }

    .mensaje{
      background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      margin-bottom:10px;
    }

    .usuario{
      background:linear-gradient(135deg,rgba(76,201,240,.15),rgba(58,134,255,.12));
    }

    .botsito{
      background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);
    }

    .composer{
      display:grid;
      gap:10px;
      padding:12px;
      border-top:1px solid var(--border);
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow);
    }

    .on{
      background:linear-gradient(135deg,#2dd4bf,#22c55e);
      border-color:transparent;
      color:#04151f;
      font-weight:700;
    }

    .off{
      background:linear-gradient(135deg,#ff4d6d,#ff8fa3);
      border-color:transparent;
      color:white;
      font-weight:700;
    }

    #estado{
      color:var(--muted);
      font-size:14px;
    }

    #resumen-container{padding:12px}

    footer{
      color:var(--muted);
      text-align:center;
      padding:14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="topbar">
        <div class="logo">B</div>
        <div class="brand">
          Baifo IA
          <small>Asistente escolar con voz</small>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="panel chat-area">
          <div id="chat"></div>

          <div class="composer">
            <div class="row">
              <button class="on" onclick="activarModoBaifo()">🟢 Encender Baifo</button>
              <button class="off" onclick="detenerModoBaifo()">🔴 Apagar Baifo</button>
              <button onclick="limpiarChat()">🧹 Limpiar pantalla</button>
              <span id="estado">Baifo está apagado.</span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer>© <span id="year"></span> Baifo</footer>
  </div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

let reconocimientoBaifo = null;
let modoBaifoActivo = false;
let conversacionActiva = false;
let audioBaifo = null;
let vozAbortController = null;
let baifoHablando = false;
let reiniciando = false;

const palabrasBaifo = [
  "baifo","vaifo","paifo","byfo","bayfo","baifon","bai fo",
  "bifo","baif","bai","aifo","baifó","vaifó","bay foh",
  "hey baifo","ey baifo","oye baifo","oi baifo",
  "oye","hey","ey","oi"
];

function contieneWakeWord(texto){
  texto = normalizarTexto(texto);
  return palabrasBaifo.some(p => texto.includes(normalizarTexto(p)));
}

function normalizarTexto(texto){
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[¿?¡!.,;:]/g,"")
    .trim();
}

function quitarWakeWord(texto){
  let t = normalizarTexto(texto);

  palabrasBaifo.forEach(p=>{
    t = t.replaceAll(normalizarTexto(p),"");
  });

  return t.trim();
}

function esSoloActivacion(texto){
  const limpio = quitarWakeWord(texto);
  return limpio.length <= 2;
}

function contieneCodigo(texto){
  const t = texto.toLowerCase();
  return (
    t.includes("```") ||
    t.includes("#include") ||
    t.includes("void setup") ||
    t.includes("void loop") ||
    t.includes("const int") ||
    t.includes("function") ||
    t.includes("class ") ||
    t.includes("def ") ||
    t.includes("<html") ||
    t.includes("<script") ||
    (t.includes("{") && t.includes("}") && t.includes(";"))
  );
}

function escaparHTML(texto){
  return texto
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function formatearRespuesta(texto){
  const partes = texto.split("```");
  let html = "";

  partes.forEach((parte, index) => {
    if(index % 2 === 1){
      html += "<pre style='white-space:pre-wrap;overflow:auto;background:rgba(0,0,0,.25);padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.08);'><code>" + escaparHTML(parte.trim()) + "</code></pre>";
    }else{
      html += escaparHTML(parte).replaceAll("\n","<br>");
    }
  });

  return html;
}

function agregarMensaje(texto,clase=''){
  const chat=document.getElementById('chat');
  const m=document.createElement('div');
  m.className='mensaje '+clase;
  m.innerHTML=texto;
  chat.appendChild(m);
  chat.scrollTop=chat.scrollHeight;
}

function crearReconocimientoNuevo(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("Tu navegador no soporta reconocimiento de voz.");
    return;
  }

  if(reconocimientoBaifo){
    try{
      reconocimientoBaifo.onend = null;
      reconocimientoBaifo.onresult = null;
      reconocimientoBaifo.onerror = null;
      reconocimientoBaifo.stop();
    }catch(e){}
  }

  reconocimientoBaifo = new SR();
  reconocimientoBaifo.lang = "es-ES";
  reconocimientoBaifo.continuous = true;
  reconocimientoBaifo.interimResults = false;
  reconocimientoBaifo.maxAlternatives = 5;

  reconocimientoBaifo.onresult = (e)=>{
    if(baifoHablando) return;

    let texto = "";
    for(let i=e.resultIndex; i<e.results.length; i++){
      texto += e.results[i][0].transcript.toLowerCase() + " ";
    }

    texto = texto.trim();
    console.log("Escuchado:", texto);

    if(!texto) return;

    if(!conversacionActiva){
      if(contieneWakeWord(texto)){
        conversacionActiva = true;

        const posiblePregunta = quitarWakeWord(texto);

        if(posiblePregunta.length > 2){
          enviarPreguntaStreaming(posiblePregunta);
        }else{
          document.getElementById("estado").textContent = "Baifo espera tu pregunta.";
          hablarLocal("Te escucho");
        }
      }
      return;
    }

    if(conversacionActiva){
      if(contieneWakeWord(texto) && esSoloActivacion(texto)){
        document.getElementById("estado").textContent = "Baifo espera tu pregunta.";
        hablarLocal("Te escucho");
        return;
      }

      const pregunta = quitarWakeWord(texto);

      if(pregunta.length > 2){
        enviarPreguntaStreaming(pregunta);
      }else{
        document.getElementById("estado").textContent = "Baifo espera tu pregunta.";
      }
    }
  };

  reconocimientoBaifo.onerror = (e)=>{
    console.log("Error reconocimiento:", e.error);
  };

  reconocimientoBaifo.onend = ()=>{
    if(modoBaifoActivo && !baifoHablando && !reiniciando){
      reiniciarReconocimientoFuerte();
    }
  };
}

function iniciarReconocimiento(){
  if(!modoBaifoActivo || baifoHablando) return;

  try{
    reconocimientoBaifo.start();

    if(conversacionActiva){
      document.getElementById("estado").textContent = "Baifo espera tu pregunta.";
    }else{
      document.getElementById("estado").textContent = "Baifo está escuchando.";
    }

  }catch(e){
    console.log("No se pudo iniciar todavía:", e.message);
  }
}

function reiniciarReconocimientoFuerte(){
  if(!modoBaifoActivo || baifoHablando) return;

  reiniciando = true;

  setTimeout(()=>{
    crearReconocimientoNuevo();

    setTimeout(()=>{
      reiniciando = false;
      iniciarReconocimiento();
    },500);

  },800);
}

async function hablarLocal(texto){
  if(contieneCodigo(texto)){
    reiniciarReconocimientoFuerte();
    return;
  }

  try{
    baifoHablando = true;
    document.getElementById("estado").textContent = "Baifo está hablando.";

    if(reconocimientoBaifo){
      try{
        reconocimientoBaifo.stop();
      }catch(e){}
    }

    if(audioBaifo){
      audioBaifo.pause();
      audioBaifo.currentTime = 0;
      audioBaifo = null;
    }

    if(vozAbortController){
      vozAbortController.abort();
    }

    vozAbortController = new AbortController();

    const res = await fetch('/voz',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({texto}),
      signal:vozAbortController.signal
    });

    if(!res.ok){
      const err = await res.text();
      console.error("Error en /voz:", err);
      baifoHablando = false;
      reiniciarReconocimientoFuerte();
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    audioBaifo = new Audio(url);

    audioBaifo.onended = () => {
      baifoHablando = false;

      if(conversacionActiva){
        document.getElementById("estado").textContent = "Baifo espera tu pregunta.";
      }else{
        document.getElementById("estado").textContent = "Baifo está escuchando.";
      }

      reiniciarReconocimientoFuerte();
    };

    audioBaifo.onerror = () => {
      baifoHablando = false;
      reiniciarReconocimientoFuerte();
    };

    await audioBaifo.play();

  }catch(error){
    console.error("No pudo hablar:", error);
    baifoHablando = false;
    reiniciarReconocimientoFuerte();
  }
}

async function enviarPreguntaStreaming(pregunta){
  agregarMensaje('<strong>Tú:</strong> '+pregunta,'usuario');

  const res = await fetch('/stream',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pregunta})
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let textoCompleto = "";

  while(true){
    const {done,value} = await reader.read();
    if(done) break;

    const chunk = decoder.decode(value);
    textoCompleto += chunk;
  }

  agregarMensaje('<strong>Baifo 🤖:</strong> '+formatearRespuesta(textoCompleto),'botsito');

  await hablarLocal(textoCompleto);
}

function activarModoBaifo(){
  modoBaifoActivo = true;
  conversacionActiva = false;
  baifoHablando = false;
  reiniciando = false;

  crearReconocimientoNuevo();

  setTimeout(()=>{
    iniciarReconocimiento();
  },300);

  document.getElementById("estado").textContent = "Baifo está escuchando.";
}

function detenerModoBaifo(){
  modoBaifoActivo = false;
  conversacionActiva = false;
  baifoHablando = false;
  reiniciando = false;

  if(reconocimientoBaifo){
    try{
      reconocimientoBaifo.onend = null;
      reconocimientoBaifo.onresult = null;
      reconocimientoBaifo.onerror = null;
      reconocimientoBaifo.stop();
    }catch(e){}
  }

  reconocimientoBaifo = null;

  speechSynthesis.cancel();

  if(audioBaifo){
    audioBaifo.pause();
    audioBaifo.currentTime = 0;
    audioBaifo = null;
  }

  if(vozAbortController){
    vozAbortController.abort();
    vozAbortController = null;
  }

  document.getElementById("estado").textContent = "Baifo está apagado.";
}

function limpiarChat(){
  document.getElementById('chat').innerHTML="";
}
</script>

</body>
</html>
