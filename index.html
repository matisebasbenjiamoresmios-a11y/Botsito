<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Botsito IA</title>
  <link rel="icon" href="/favicon.ico" />

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#121821;
      --text:#e6eefc;
      --muted:#98a4ba;
      --border:rgba(255,255,255,.08);
      --accent:#4cc9f0;
      --accent-2:#3a86ff;
      --radius:16px;
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    html,body{height:100%}
    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      min-height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:20;
      background:linear-gradient(180deg,rgba(0,0,0,.25),transparent);
      backdrop-filter:blur(6px);
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:16px 20px;
    }

    .logo{
      width:36px;
      height:36px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      display:grid;
      place-items:center;
      color:#06131d;
      font-weight:900;
    }

    .brand{
      font-weight:700;
    }

    .brand small{
      display:block;
      color:var(--muted);
      font-weight:400;
    }

    main{
      padding:18px;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      display:grid;
      gap:16px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .chat-area{
      display:grid;
      grid-template-rows:1fr auto;
    }

    #chat{
      padding:18px;
      max-height:55vh;
      overflow:auto;
      scroll-behavior:smooth;
    }

    .mensaje{
      background:linear-gradient(180deg,rgba(255,255,255,.03),transparent);
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      margin-bottom:10px;
    }

    .usuario{
      background:linear-gradient(135deg,rgba(76,201,240,.15),rgba(58,134,255,.12));
    }

    .botsito{
      background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);
    }

    .composer{
      display:grid;
      gap:10px;
      padding:12px;
      border-top:1px solid var(--border);
    }

    .row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    #pregunta{
      flex:1;
      min-width:220px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.02);
      color:var(--text);
      padding:12px;
      border-radius:12px;
      outline:none;
    }

    button{
      appearance:none;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
    }

    button:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow);
    }

    .primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      border-color:transparent;
      color:#04151f;
      font-weight:700;
    }

    .mic{
      background:linear-gradient(135deg,#ff4d6d,#ff8fa3);
      border-color:transparent;
      color:white;
      font-weight:700;
    }

    #resumen-container{
      padding:12px;
    }

    footer{
      color:var(--muted);
      text-align:center;
      padding:14px;
    }

    pre{
      overflow:auto;
      padding:12px;
      border-radius:12px;
      background:#05070a;
    }

    code{
      font-family:Consolas, monospace;
    }

    @media (max-width:720px){
      #chat{max-height:50vh}
    }
  </style>

  <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
  <script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="topbar">
        <div class="logo">B</div>
        <div class="brand">
          Botsito IA
          <small>Asistente escolar con voz</small>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="panel chat-area">
          <div id="chat"></div>

          <div class="composer">
            <div class="row">
              <input type="text" id="pregunta" placeholder="Escribe o habla tu pregunta…" />
              <button class="primary" onclick="enviarPregunta()">Preguntar</button>
              <button class="mic" onclick="escucharVoz()">🎙️ Hablar</button>
            </div>

            <div class="row">
              <input type="file" id="archivo" style="display:none" onchange="mostrarNombreArchivo()" />
              <button type="button" onclick="document.getElementById('archivo').click()">Agregar archivo 📂</button>
              <button onclick="subirArchivo()">Subir archivo</button>
              <small id="nombre-archivo" style="color:var(--muted);margin-left:8px"></small>
            </div>

            <div class="row">
              <button onclick="limpiarChat()">🧹 Limpiar pantalla</button>
              <button onclick="detenerVoz()">🔇 Detener voz</button>
            </div>
          </div>
        </section>

        <section class="panel" id="resumen-container"></section>
      </div>
    </main>

    <footer>© <span id="year"></span> Botsito · 2do Ica</footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function mostrarNombreArchivo() {
      const archivo = document.getElementById('archivo').files[0];
      const label = document.getElementById('nombre-archivo');
      label.textContent = archivo ? archivo.name : "";
    }

    function agregarMensaje(texto, clase = '') {
      const chat = document.getElementById('chat');
      const mensaje = document.createElement('div');
      mensaje.className = 'mensaje ' + clase;
      mensaje.innerHTML = texto;
      chat.appendChild(mensaje);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderBotMessage(text) {
      const chat = document.getElementById('chat');

      if (text.includes("```")) {
        const partes = text.split("```");
        let mensajeFinal = "";

        for (let i = 0; i < partes.length; i++) {
          if (i % 2 === 1) {
            const bloque = partes[i].trim();
            const firstLine = bloque.split("\n")[0];
            let code = bloque;
            let lang = "";

            if (firstLine.match(/^[a-zA-Z]+$/)) {
              lang = firstLine;
              code = bloque.substring(firstLine.length).trim();
            }

            mensajeFinal += `<pre><code class="language-${lang}">${code}</code></pre>`;
          } else {
            mensajeFinal += `<p>${partes[i]}</p>`;
          }
        }

        const mensaje = document.createElement('div');
        mensaje.className = 'mensaje botsito';
        mensaje.innerHTML = `<strong>Botsito 🧑‍🤖:</strong><br>${mensajeFinal}`;
        chat.appendChild(mensaje);
        chat.scrollTop = chat.scrollHeight;
        hljs.highlightAll();
      } else {
        agregarMensaje('<strong>Botsito 🧑‍🤖:</strong> ' + text, 'botsito');
      }
    }

    function hablar(texto) {
      if (!texto) return;

      speechSynthesis.cancel();

      const voz = new SpeechSynthesisUtterance(texto);
      voz.lang = "es-ES";
      voz.rate = 1;
      voz.pitch = 1;
      voz.volume = 1;

      speechSynthesis.speak(voz);
    }

    function detenerVoz() {
      speechSynthesis.cancel();
    }

    function escucharVoz() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("Tu navegador no soporta reconocimiento de voz. Usá Google Chrome.");
        return;
      }

      const reconocimiento = new SpeechRecognition();

      reconocimiento.lang = "es-PY";
      reconocimiento.continuous = false;
      reconocimiento.interimResults = false;

      reconocimiento.start();

      reconocimiento.onstart = function () {
        agregarMensaje("<strong>Botsito 🧑‍🤖:</strong> 🎙️ Te estoy escuchando...", "botsito");
      };

      reconocimiento.onresult = function (event) {
        const texto = event.results[0][0].transcript;
        document.getElementById("pregunta").value = texto;
        enviarPregunta();
      };

      reconocimiento.onerror = function (event) {
        agregarMensaje("<strong>Botsito 🧑‍🤖:</strong> ⚠️ Error al escuchar: " + event.error, "botsito");
      };
    }

    function enviarPregunta() {
      const pregunta = document.getElementById('pregunta').value.trim();

      if (!pregunta) return;

      agregarMensaje('<strong>Tú:</strong> ' + pregunta, 'usuario');
      document.getElementById('pregunta').value = "";

      fetch('/preguntar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pregunta })
      })
      .then(res => res.json())
      .then(data => {
        renderBotMessage(data.respuesta);
        hablar(data.respuesta);
      })
      .catch(err => {
        agregarMensaje('<strong>Botsito 🧑‍🤖:</strong> ⚠️ Error al procesar la pregunta: ' + err.message, 'botsito');
      });
    }

    function subirArchivo() {
      const archivo = document.getElementById('archivo').files[0];

      if (!archivo) return;

      agregarMensaje('<strong>Botsito 🧑‍🤖:</strong> ⏳ Procesando archivo...', 'botsito');

      const formData = new FormData();
      formData.append('archivo', archivo);

      fetch('/upload', {
        method: 'POST',
        body: formData
      })
      .then(res => res.json())
      .then(respuesta => {
        if (respuesta.resumen) {
          const resumenContainer = document.getElementById('resumen-container');
          resumenContainer.innerHTML = '';

          respuesta.resumen.forEach((parte, index) => {
            const parteElemento = document.createElement('div');
            parteElemento.className = 'mensaje botsito';
            parteElemento.innerHTML = `<strong>Botsito 🧑‍🤖 (Resumen parte ${index + 1}):</strong><br>${parte}`;
            resumenContainer.appendChild(parteElemento);
            hljs.highlightAll();
          });
        } else {
          agregarMensaje('<strong>Botsito 🧑‍🤖:</strong> ✅ Archivo recibido correctamente.', 'botsito');
        }
      })
      .catch(error => {
        agregarMensaje('<strong>Botsito 🧑‍🤖:</strong> ⚠️ Error al subir archivo: ' + error.message, 'botsito');
      });
    }

    function limpiarChat() {
      document.getElementById('chat').innerHTML = "";
      document.getElementById('resumen-container').innerHTML = "";
      speechSynthesis.cancel();
    }

    const inputPregunta = document.getElementById('pregunta');

    inputPregunta.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviarPregunta();
      }
    });
  </script>
</body>
</html>
