<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Baifo IA</title>
</head>

<body>

<button onclick="activar()">Encender Baifo</button>

<script>
let SR;
let escuchando=false;

function hablarLocal(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang="es-ES";
  speechSynthesis.speak(u);
}

async function hablarIA(texto){
  const res=await fetch('/voz',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({texto})
  });

  const blob=await res.blob();
  const url=URL.createObjectURL(blob);

  const audio=new Audio(url);
  audio.play();
}

function activar(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  SR=new SpeechRecognition();

  SR.lang="es-ES";
  SR.continuous=true;

  SR.onresult=(e)=>{
    const txt=e.results[e.results.length-1][0].transcript.toLowerCase();

    if(!escuchando){
      if(txt.includes("baifo")){
        escuchando=true;
        hablarLocal("Te escucho");
      }
      return;
    }

    escuchando=false;

    const pregunta=txt.replace("baifo","").trim();

    if(pregunta.length>2){
      responder(pregunta);
    }
  };

  SR.onend=()=>setTimeout(()=>SR.start(),300);

  SR.start();
}

async function responder(pregunta){
  let textoFinal="";

  const res=await fetch('/stream',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pregunta})
  });

  const reader=res.body.getReader();
  const decoder=new TextDecoder();

  while(true){
    const {done,value}=await reader.read();
    if(done) break;

    const chunk=decoder.decode(value);
    textoFinal+=chunk;
  }

  hablarIA(textoFinal);
}
</script>

</body>
</html>
